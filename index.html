<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RydR</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* FULL SCREEN HERO */
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      background: url("IMG_0423.jpeg") center/cover no-repeat;
      display: flex;
      align-items: center;
    }

    /* DARK OVERLAY FOR READABILITY */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    /* LEFT PANEL */
    .left-panel {
      position: relative;
      z-index: 2;
      width: 40%;
      padding: 60px;
      color: white;
    }

    .logo {
      font-size: 42px;
      font-weight: bold;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .btn {
      background: #00c2ff;
      border: none;
      padding: 12px 22px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background: #00a6d6;
    }

    /* ROCHESTER LOGO AREA */
    .city-logo {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 2;
      color: white;
      font-size: 12px;
      opacity: 0.8;
    }

    .city-logo img {
      height: 40px;
      display: block;
      margin-top: 5px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .left-panel {
        width: 100%;
        padding: 30px;
      }

      .logo {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <div class="overlay"></div>

    <div class="left-panel">
      <div class="logo">RydR</div>

      <div class="tagline">
        Moving Rochester forward.<br />
        Simple. Safe. Reliable rides across the city.
      </div>

      <button class="btn">Book a Ride</button>
    </div>

    <div class="city-logo">
      City of Rochester
      <img src="rochester-city-logo.png" alt="Rochester Logo" />
    </div>

  </section>

</body>
</html>
