<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RydR</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url("IMG_0423.jpeg") no-repeat center center;
      background-size: cover;
      height: 100vh;
    }

    /* LOGO (top center, spaced down) */
    .logo {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      font-weight: bold;
      color: white;
      letter-spacing: 2px;
    }

    /* LEFT CENTER PANEL */
    .left-center {
      position: absolute;
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

 .book-btn {
  background: linear-gradient(135deg, #1e90ff, #0066ff);
  color: white;
  padding: 16px 30px;
  font-size: 18px;
  border-radius: 10px;
  text-decoration: none;
  text-align: center;
  transition: all 0.3s ease;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.book-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

    .learn-more {
      margin-top: 15px;
      color: white;
      text-decoration: underline;
      cursor: pointer;
      text-align: center;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 10px;
      max-width: 400px;
      text-align: center;
    }

    .close {
      float: right;
      cursor: pointer;
      font-size: 20px;
    }

    /* MOBILE FIX */
    @media (max-width: 768px) {
      .left-center {
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .logo {
        top: 40px;
        font-size: 26px;
      }
    }

  </style>
</head>

<body>

  <!-- LOGO -->
  <div class="logo">RydR</div>

  <!-- LEFT CENTER BUTTON AREA -->
  <div class="left-center">
    <a href="booking.html" class="book-btn">Book Now</a>
    <div class="learn-more" onclick="openModal()">Learn More</div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">X</span>
      <h2>How It Works</h2>
      <p>
        Enter your pickup and drop-off, choose your time,
        and submit your ride. A driver is assigned quickly.
      </p>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById("modal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }
  </script>

</body>
</html>
