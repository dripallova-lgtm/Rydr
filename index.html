<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RydR</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #ffffff;
    }

    /* Top bar */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #121621;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    nav a {
      color: #ffffff;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.8;
    }

    nav a:hover {
      opacity: 1;
    }

    /* Hero section */
    .hero {
      text-align: center;
      padding: 120px 20px;
      background: linear-gradient(135deg, #0f1115, #1a2233);
    }

    .hero h1 {
      font-size: 64px;
      margin-bottom: 10px;
      letter-spacing: 4px;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .btn {
      background: #00c2ff;
      color: #000;
      padding: 14px 28px;
      border: none;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background: #00a6d6;
    }

    /* Section */
    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .card {
      background: #1a2233;
      padding: 20px;
      border-radius: 12px;
      width: 220px;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      opacity: 0.6;
      background: #121621;
    }

    /* Mobile */
    @media (max-width: 600px) {
      .hero h1 {
        font-size: 42px;
      }

      header {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">RydR</div>
    <nav>
      <a href="#">About</a>
      <a href="#">Pricing</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>RydR</h1>
    <p>Simple. Safe. Reliable rides when you need them.</p>
    <button class="btn">Book a Ride</button>
  </section>

  <section class="section">
    <h2>How It Works</h2>

    <div class="cards">
      <div class="card">
        <h3>1. Request</h3>
        <p>Enter your pickup location.</p>
      </div>

      <div class="card">
        <h3>2. Match</h3>
        <p>We connect you with a driver.</p>
      </div>

      <div class="card">
        <h3>3. Ride</h3>
        <p>Get there safely and quickly.</p>
      </div>
    </div>
  </section>

  <footer>
    © 2026 RydR. All rights reserved.
  </footer>

</body>
</html>
