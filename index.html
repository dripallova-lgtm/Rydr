<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RydR</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url("img_0423.jpeg") no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
    }

    /* RydR Logo */
    .rydR-logo {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: bold;
      color: white;
    }

    /* City Logo */
    .city-logo {
      position: absolute;
      bottom: 20px;
      left: 20px;
    }

    .city-logo img {
      width: 90px;
    }

    /* Left Panel */
    .left-panel {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 300px;
      background: rgba(0,0,0,0.6);
      padding: 40px 20px;
      color: white;

      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .book-btn {
      background: #1e90ff;
      color: white;
      padding: 14px;
      text-align: center;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 18px;
    }

    .learn-more {
      margin-top: 15px;
      color: #ddd;
      text-decoration: underline;
      cursor: pointer;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
    }

    .close {
      float: right;
      cursor: pointer;
    }

    /* Mobile Fix */
    @media (max-width: 768px) {
      .left-panel {
        width: 100%;
        height: auto;
        position: relative;
      }
    }
  </style>
</head>

<body>

  <div class="rydR-logo">RydR</div>

  <div class="city-logo">
    <img src="Roc_logo.jpeg">
  </div>

  <div class="left-panel">
    <h1>Book Your Ride</h1>

    <a href="booking.html" class="book-btn">Book Now</a>

    <div class="learn-more" onclick="openModal()">
      Learn More
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">X</span>
      <h2>How It Works</h2>
      <p>
        Enter your trip details, choose your time, and submit your ride request.
        A driver will be assigned quickly.
      </p>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById("modal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }
  </script>

</body>
</html>
